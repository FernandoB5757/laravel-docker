###############################################################################
# Laravel Docker Development Platform
# Professional multi-project, multi-PHP-version environment
###############################################################################

networks:
  laravel_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  meilisearch_data:
    driver: local
  composer_cache:
    driver: local

services:

  ###############################################################################
  # TRAEFIK — Reverse Proxy + Automatic *.test Domain Routing
  ###############################################################################
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"   # Traefik dashboard
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./docker/traefik/dynamic:/etc/traefik/dynamic:ro"
      - "./docker/traefik/certs:/certs:ro"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.test`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

  ###############################################################################
  # NGINX — Central Web Server (FastCGI to PHP-FPM containers)
  ###############################################################################
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./projects:/var/www:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - php70
      - php71
      - php72
      - php73
      - php74
      - php80
      - php81
      - php82
      - php83
    networks:
      laravel_network:
        ipv4_address: 172.20.0.3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx.rule=HostRegexp(`{subdomain:[a-z0-9-]+}.test`)"
      - "traefik.http.routers.nginx.entrypoints=web"
      - "traefik.http.services.nginx.loadbalancer.server.port=80"

  ###############################################################################
  # PHP 8.3 — FPM
  ###############################################################################
  php83:
    build:
      context: ./docker/php/php83
      dockerfile: Dockerfile
    container_name: php83
    restart: unless-stopped
    volumes:
      - ./projects:/var/www
      - ./docker/php/php83/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
      - ./docker/php/php83/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
      - composer_cache:/root/.composer/cache
    environment:
      - PHP_VERSION=8.3
      - XDEBUG_MODE=${XDEBUG_MODE:-off}
      - XDEBUG_CLIENT_HOST=${XDEBUG_CLIENT_HOST:-host-gateway}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "php", "-r", "exit(0);"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      laravel_network:
        ipv4_address: 172.20.0.10

