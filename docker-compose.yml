###############################################################################
# Laravel Docker Development Platform
# Multi-project, multi-PHP-version local environment
###############################################################################

networks:
  laravel_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  mariadb_data:
  redis_data:
  meilisearch_data:
  composer_cache:

# ---------------------------------------------------------------------------
# Extension fields — reusable anchors for PHP service definitions
# ---------------------------------------------------------------------------
x-php-common: &php-common
  restart: unless-stopped
  extra_hosts:
    - "host.docker.internal:host-gateway"
  healthcheck:
    test: ["CMD", "php", "-r", "exit(0);"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

x-php-env: &php-env
  XDEBUG_MODE: ${XDEBUG_MODE:-off}
  XDEBUG_CLIENT_HOST: ${XDEBUG_CLIENT_HOST:-host-gateway}
  WWWUSER: ${WWWUSER:-1000}
  WWWGROUP: ${WWWGROUP:-1000}

x-php-volumes-v3: &php-volumes-v3
  - ./projects:/var/www
  - ./docker/php/conf/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
  - ./docker/php/conf/xdebug-v3.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
  - composer_cache:/root/.composer/cache
  - ~/.ssh:/ssh-host:ro

x-php-volumes-v2: &php-volumes-v2
  - ./projects:/var/www
  - ./docker/php/conf/php.ini:/usr/local/etc/php/conf.d/custom.ini:ro
  - ./docker/php/conf/xdebug-v2.ini:/usr/local/etc/php/conf.d/xdebug.ini:ro
  - composer_cache:/root/.composer/cache
  - ~/.ssh:/ssh-host:ro

services:

  ###############################################################################
  # TRAEFIK — Reverse Proxy + Automatic *.test Domain Routing
  ###############################################################################
  traefik:
    image: traefik:v3.4
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--api.dashboard=true"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--log.level=INFO"
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard → http://traefik.test
    volumes:
      - "./docker/traefik/dynamic:/etc/traefik/dynamic:ro"
      - "./docker/traefik/certs:/certs:ro"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.2
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.test`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=web"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"

  ###############################################################################
  # NGINX — Central Web Server (FastCGI to PHP-FPM containers)
  ###############################################################################
  nginx:
    image: nginx:1.25-alpine
    container_name: nginx
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 8192
        hard: 8192
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./projects:/var/www:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - php70
      - php71
      - php72
      - php73
      - php74
      - php80
      - php81
      - php82
      - php83
    networks:
      laravel_network:
        ipv4_address: 172.20.0.3
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nginx.rule=HostRegexp(`[a-z0-9-]+\\.test`)"
      - "traefik.http.routers.nginx.entrypoints=web"
      - "traefik.http.services.nginx.loadbalancer.server.port=80"

  ###############################################################################
  # PHP — FPM containers (one per version)
  # Tier: 8.x Modern  — Dockerfile.8x  — PHP 8.0, 8.1, 8.2, 8.3
  # Tier: 7.x Modern  — Dockerfile.7x  — PHP 7.2, 7.3, 7.4
  # Tier: 7.x Legacy  — Dockerfile.legacy — PHP 7.0, 7.1
  ###############################################################################

  php83:
    <<: *php-common
    build:
      context: ./docker/php
      dockerfile: Dockerfile.8x
      args:
        PHP_VERSION: "8.3"
    container_name: php83
    volumes: *php-volumes-v3
    environment:
      <<: *php-env
      PHP_VERSION: "8.3"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.10

  php82:
    <<: *php-common
    build:
      context: ./docker/php
      dockerfile: Dockerfile.8x
      args:
        PHP_VERSION: "8.2"
    container_name: php82
    volumes: *php-volumes-v3
    environment:
      <<: *php-env
      PHP_VERSION: "8.2"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.11

  php81:
    <<: *php-common
    build:
      context: ./docker/php
      dockerfile: Dockerfile.8x
      args:
        PHP_VERSION: "8.1"
    container_name: php81
    volumes: *php-volumes-v3
    environment:
      <<: *php-env
      PHP_VERSION: "8.1"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.12

  php80:
    <<: *php-common
    build:
      context: ./docker/php
      dockerfile: Dockerfile.8x
      args:
        PHP_VERSION: "8.0"
    container_name: php80
    volumes: *php-volumes-v3
    environment:
      <<: *php-env
      PHP_VERSION: "8.0"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.13

  php74:
    <<: *php-common
    build:
      context: ./docker/php
      dockerfile: Dockerfile.7x
      args:
        PHP_VERSION: "7.4"
        GD_CONFIGURE_FLAGS: "--with-freetype --with-jpeg"
    container_name: php74
    volumes: *php-volumes-v3
    environment:
      <<: *php-env
      PHP_VERSION: "7.4"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.14

  php73:
    <<: *php-common
    build:
      context: ./docker/php
      dockerfile: Dockerfile.7x
      args:
        PHP_VERSION: "7.3"
        GD_CONFIGURE_FLAGS: "--with-freetype-dir=/usr --with-jpeg-dir=/usr"
    container_name: php73
    volumes: *php-volumes-v3
    environment:
      <<: *php-env
      PHP_VERSION: "7.3"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.15

  php72:
    <<: *php-common
    build:
      context: ./docker/php
      dockerfile: Dockerfile.7x
      args:
        PHP_VERSION: "7.2"
        GD_CONFIGURE_FLAGS: "--with-freetype-dir=/usr --with-jpeg-dir=/usr"
    container_name: php72
    volumes: *php-volumes-v3
    environment:
      <<: *php-env
      PHP_VERSION: "7.2"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.16

  php71:
    <<: *php-common
    build:
      context: ./docker/php
      dockerfile: Dockerfile.legacy
      args:
        PHP_VERSION: "7.1"
        XDEBUG_VERSION: "2.9.8"
    container_name: php71
    volumes: *php-volumes-v2
    environment:
      <<: *php-env
      PHP_VERSION: "7.1"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.17

  php70:
    <<: *php-common
    build:
      context: ./docker/php
      dockerfile: Dockerfile.legacy
      args:
        PHP_VERSION: "7.0"
        XDEBUG_VERSION: "2.7.2"
    container_name: php70
    volumes: *php-volumes-v2
    environment:
      <<: *php-env
      PHP_VERSION: "7.0"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.18

  ###############################################################################
  # MARIADB — Single shared instance, one database per project
  ###############################################################################
  mariadb:
    image: mariadb:10.11
    container_name: mariadb
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/conf.d/my.cnf:/etc/mysql/conf.d/my.cnf:ro
      - ./docker/mariadb/initdb.d:/docker-entrypoint-initdb.d:ro
      - ./docker/mariadb/dumps:/dumps
    ports:
      - "${DB_PORT:-3306}:3306"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.20
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  ###############################################################################
  # REDIS — Cache, Queues, Sessions (16 databases — one per project)
  ###############################################################################
  redis:
    image: redis:7.2-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - redis_data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.21
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  ###############################################################################
  # MEILISEARCH — Full-text search for Laravel Scout
  ###############################################################################
  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: meilisearch
    restart: unless-stopped
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-masterkey}
      MEILI_ENV: development
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    networks:
      laravel_network:
        ipv4_address: 172.20.0.22
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.meilisearch.rule=Host(`meilisearch.test`)"
      - "traefik.http.routers.meilisearch.entrypoints=web"
      - "traefik.http.services.meilisearch.loadbalancer.server.port=7700"

  ###############################################################################
  # MAILHOG — SMTP catch-all for development (no emails leave the machine)
  ###############################################################################
  mailhog:
    image: mailhog/mailhog:latest
    container_name: mailhog
    restart: unless-stopped
    ports:
      - "${MAIL_PORT:-1025}:1025"    # SMTP
      - "${MAILHOG_PORT:-8025}:8025" # Web UI
    networks:
      laravel_network:
        ipv4_address: 172.20.0.23
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mailhog.rule=Host(`mail.test`)"
      - "traefik.http.routers.mailhog.entrypoints=web"
      - "traefik.http.services.mailhog.loadbalancer.server.port=8025"

  ###############################################################################
  # PHPMYADMIN — Web UI for MariaDB → http://pma.test
  ###############################################################################
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      PMA_USER: ${DB_USERNAME:-root}
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
      UPLOAD_LIMIT: 256M
    networks:
      laravel_network:
        ipv4_address: 172.20.0.24
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.phpmyadmin.rule=Host(`pma.test`)"
      - "traefik.http.routers.phpmyadmin.entrypoints=web"
      - "traefik.http.services.phpmyadmin.loadbalancer.server.port=80"
