; ============================================================
; Xdebug 2.7.x Configuration — PHP 7.0
;
; NOTE: Xdebug 2.x does NOT support the XDEBUG_MODE environment
; variable. The XDEBUG_MODE=debug setting in .env has no effect here.
;
; Remote debugging is DISABLED by default to avoid performance
; degradation (a connection attempt is made on every request when enabled).
;
; To enable step debugging for PHP 7.0:
;   1. Set remote_enable = 1 and remote_autostart = 1 below
;   2. Restart: docker compose restart php70
;   3. Configure your IDE to listen on port 9000 (NOT 9003)
; ============================================================
[xdebug]
xdebug.remote_enable    = 0
xdebug.remote_autostart = 0
xdebug.remote_host      = host.docker.internal
xdebug.remote_port      = 9000
xdebug.remote_handler   = dbgp
xdebug.idekey           = PHPSTORM
xdebug.max_nesting_level = 512
