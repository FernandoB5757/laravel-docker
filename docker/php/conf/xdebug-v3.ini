; ============================================================
; Xdebug 3.x Configuration — PHP 7.2 and above
; Controlled via XDEBUG_MODE environment variable in .env
;
; To enable step debugging:
;   1. Set XDEBUG_MODE=debug in your .env file
;   2. Restart the stack: docker compose up -d
;   3. Configure your IDE to listen on port 9003
; ============================================================
[xdebug]
xdebug.mode                  = ${XDEBUG_MODE}
xdebug.start_with_request    = yes
xdebug.client_host           = host.docker.internal
xdebug.client_port           = 9003
xdebug.log                   = /tmp/xdebug.log
xdebug.idekey                = PHPSTORM
xdebug.max_nesting_level     = 512

; Profiler (only active when mode includes 'profile')
xdebug.output_dir            = /tmp/xdebug-profiles
xdebug.profiler_output_name  = cachegrind.out.%p.%r
