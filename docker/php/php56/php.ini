; ============================================================
; PHP 5.6 Custom Configuration
; ============================================================

[PHP]
; Legacy compatibility — many PHP 5.x apps use short open tags
short_open_tag = On

; Error handling
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Performance
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
max_input_vars = 5000

; File uploads
upload_max_filesize = 128M
post_max_size = 128M

; Timezone
date.timezone = UTC

; OPcache (available since PHP 5.5)
opcache.enable = 1
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
opcache.max_accelerated_files = 10000
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8

; Session
session.gc_maxlifetime = 86400
