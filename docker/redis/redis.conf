# ============================================================
# Redis Configuration — Laravel Development
# ============================================================

# Persistence
save 900 1
save 300 10
save 60 10000

appendonly yes
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Performance
tcp-backlog 511
timeout 0
tcp-keepalive 300

# Logging
loglevel notice
logfile ""

# Network — accept from all (Docker network only)
bind 0.0.0.0
protected-mode no

# Databases
databases 16
